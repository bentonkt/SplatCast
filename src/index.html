<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplatCast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

    /* Lobby styles */
    #lobby {
      display: none;
      position: fixed; inset: 0; z-index: 2000;
      background: #1a1a2e;
      color: #fff;
      font-family: monospace;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #lobby.active { display: flex; }
    #lobby h1 {
      font-size: 48px;
      letter-spacing: 2px;
      color: #4ecdc4;
    }
    #lobby p {
      font-size: 16px;
      color: #888;
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
    }
    #lobby .lobby-actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      margin-top: 16px;
    }
    #lobby button {
      background: #4ecdc4;
      color: #1a1a2e;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      font-family: monospace;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      min-width: 240px;
    }
    #lobby button:hover { background: #45b7d1; }
    #lobby .join-form {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #lobby input {
      background: #16213e;
      color: #fff;
      border: 2px solid #333;
      padding: 12px 16px;
      font-size: 16px;
      font-family: monospace;
      border-radius: 6px;
      width: 180px;
    }
    #lobby input::placeholder { color: #555; }
    #lobby input:focus { outline: none; border-color: #4ecdc4; }
    #lobby .join-btn {
      min-width: auto;
      padding: 12px 20px;
    }

    /* Loading overlay */
    #loading-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(26, 26, 46, 0.92);
      color: #fff;
      font-family: monospace;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #loading-overlay.active { display: flex; }
    #loading-overlay .loading-text {
      font-size: 18px;
      color: #4ecdc4;
    }
    #loading-overlay .progress-bar-container {
      width: 320px;
      height: 8px;
      background: #16213e;
      border-radius: 4px;
      overflow: hidden;
    }
    #loading-overlay .progress-bar {
      height: 100%;
      width: 0%;
      background: #4ecdc4;
      border-radius: 4px;
      transition: width 0.15s ease;
    }
    #loading-overlay .progress-percent {
      font-size: 14px;
      color: #888;
    }

    /* Drag-and-drop overlay */
    #drop-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 4000;
      background: rgba(26, 26, 46, 0.85);
      color: #fff;
      font-family: monospace;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #drop-overlay.active { display: flex; }
    #drop-overlay .drop-zone {
      border: 3px dashed #4ecdc4;
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
    }
    #drop-overlay .drop-zone p {
      font-size: 22px;
      color: #4ecdc4;
    }
    #drop-overlay .drop-zone .drop-hint {
      font-size: 14px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="lobby">
    <h1>SplatCast</h1>
    <p>Collaborative 3D Gaussian splat viewer. Create a room or join an existing one to start annotating together.</p>
    <div class="lobby-actions">
      <button id="create-room-btn">Create New Room</button>
      <div class="join-form">
        <input id="room-id-input" type="text" placeholder="Room ID" maxlength="32" />
        <button id="join-room-btn" class="join-btn">Join</button>
      </div>
    </div>
  </div>
  <div id="loading-overlay">
    <div class="loading-text">Loading splat data…</div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="loading-progress-bar"></div>
    </div>
    <div class="progress-percent" id="loading-progress-text">0%</div>
  </div>
  <div id="drop-overlay">
    <div class="drop-zone">
      <p>Drop .splat or .ply file</p>
      <div class="drop-hint">Release to load</div>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <script type="module" src="./main.ts"></script>
</body>
</html>
